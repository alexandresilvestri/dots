# Application bindings
bindd = SUPER, T, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER, S, Music, exec, omarchy-launch-or-focus spotify-launcher
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, F, Firefox, exec, uwsm-app -- firefox

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE

